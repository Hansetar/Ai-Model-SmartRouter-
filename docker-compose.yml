# =====================================================================
# SmartRouter v2.0 docker-compose.yml
# =====================================================================
# 一键启动：
#   cp .env.example .env   # 首次使用，编辑 .env 填入 API Key
#   docker compose up -d --build
# 查看日志：
#   docker compose logs -f
# 停止：
#   docker compose down
# 重新构建：
#   docker compose up -d --build
#
# 数据持久化说明：
#   - 数据库: ./data/smart_router.db (SQLite, 自动创建)
#   - 模型文件: ./data/models/ (ONNX/joblib/JSON, 首次启动从镜像复制)
#   - 配置文件: ./config.yaml
# =====================================================================

services:
  smart-router:
    build:
      context: .
      dockerfile: Dockerfile
    image: han/smart-router:2.0.0
    container_name: smart-router
    restart: unless-stopped
    ports:
      - "${SMARTROUTER_PORT:-8000}:8000"
    env_file:
      - path: .env
        required: false
    environment:
      SMARTROUTER_HOST: "0.0.0.0"
      TZ: "Asia/Shanghai"
    volumes:
      # 数据库持久化 (SQLite默认路径: /app/data/smart_router.db)
      - ./data:/app/data
      # 配置文件挂载（读写，支持 Web 面板在线修改并持久化）
      - ./config.yaml:/app/config.yaml
      # .env 文件挂载（可选，确保 Web 修改密码/API Key 重启后生效）
      - ./.env:/app/.env
      # ONNX 模型挂载（持久化，首次启动自动从镜像内复制标准模型）
      - ./data/models:/app/data/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - smart-router-net

networks:
  smart-router-net:
    driver: bridge
