# =====================================================================
# OpenClaw SmartRouter docker-compose.yml
# =====================================================================
# 一键启动：
#   cp .env.example .env   # 首次使用，编辑 .env 填入 API Key
#   docker compose up -d
# 查看日志：
#   docker compose logs -f
# 停止：
#   docker compose down
#
# 所有用户可配置的环境变量均在 .env 文件中管理
# =====================================================================

services:
  smart-router:
    build:
      context: .
      dockerfile: Dockerfile
    image: han/smart-router:1.0.0
    container_name: ai-smart-router
    restart: unless-stopped
    ports:
      - "${SMARTROUTER_PORT:-8000}:8000"
    # 从 .env 文件读取所有用户配置的环境变量
    env_file:
      - path: .env
        required: false
    # 仅保留容器内部固定配置（不属于用户配置项）
    environment:
      SMARTROUTER_HOST: "0.0.0.0"
      SMARTROUTER_DB_PATH: "/app/data/smart_router.db"
    volumes:
      # 数据库持久化
      - smart-router-data:/app/data
      # 配置文件挂载（读写，支持 Web 面板在线修改并持久化）
      - ./config.yaml:/app/config.yaml
      # .env 文件挂载（读写，Web 修改密码/API Key 时同步更新，确保重启后生效）
      - ./.env:/app/.env
      # ONNX 模型挂载（可选）
      - ./models:/app/models:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - smart-router-net

volumes:
  smart-router-data:
    driver: local

networks:
  smart-router-net:
    driver: bridge
