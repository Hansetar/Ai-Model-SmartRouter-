    \                if name and \"deepseek\" in name.lower():\n                 \
    \   current_models.append(name)\n            model_row_found = True\n        \
    \    continue\n        # 输出价格\n        if \"百万tokens输出\" in clean[0]:\n      \
    \      for i, m in enumerate(current_models):\n                if i + 1 < len(clean):\n\
    \                    val = re.search(r\"([\\d.]+)\", clean[i + 1])\n         \
    \           if val:\n                        prices.setdefault(m, {})[\"price_output\"\
