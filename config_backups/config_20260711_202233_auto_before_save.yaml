  price_script: "# 从 DeepSeek 官方文档实时获取最新价格\n# https://api-docs.deepseek.com/zh-cn/quick_start/pricing\n\
    import httpx, re\n\nresp = httpx.get(\"https://api-docs.deepseek.com/zh-cn/quick_start/pricing\"\
    , timeout=15.0, follow_redirects=True)\nif resp.status_code != 200:\n    result\
    \ = None\nelse:\n    html = resp.text\n    rows = re.findall(r'<tr>(.*?)</tr>',\
    \ html, re.DOTALL)\n    prices = {}\n    current_models = []\n    model_row_found\
